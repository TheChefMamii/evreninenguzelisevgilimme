<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bakımda...</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --stripe-h: 48px;
      --accent: #e8445a;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .stripe {
      height: var(--stripe-h);
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }

    .stripe-inner {
      display: flex;
      width: max-content;
      height: 100%;
      animation: slide 6s linear infinite;
    }

    .stripe.bottom .stripe-inner {
      animation-direction: reverse;
    }

    @keyframes slide {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .stripe-block {
      width: 60px;
      height: var(--stripe-h);
      flex-shrink: 0;
    }

    .stripe-block:nth-child(odd)  { background: #f5c400; }
    .stripe-block:nth-child(even) { background: #1a1a1a; }

    .stripe-block {
      clip-path: polygon(20% 0%, 100% 0%, 80% 100%, 0% 100%);
      margin-right: -12px;
    }

    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 40px;
      max-width: 860px;
      width: 100%;
    }

    .image-wrap {
      flex-shrink: 0;
      width: 220px;
      height: 280px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      background: #e8e8e8;
    }

    .image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .text-side {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex: 1;
    }

    .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .heading {
      font-family: 'Outfit', sans-serif; /* El yazısı fontu yerine sitenin ana fontu eklendi */
      font-weight: 600; /* Başlığın tok durması için kalınlık artırıldı */
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.15;
      color: #1a1a1a;
    }

    .sub {
      font-size: 15px;
      font-weight: 300;
      color: #555;
      line-height: 1.6;
      max-width: 380px;
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: var(--accent);
      border-radius: 2px;
      margin: 4px 0;
    }

    .rotating-note {
      margin-top: 8px;
      font-size: 12px;
      color: #999;
      font-weight: 300;
      min-height: 18px;
      transition: opacity 0.4s ease;
    }

    .rotating-note.fade {
      opacity: 0;
    }

    @media (max-width: 620px) {
      .card {
        flex-direction: column;
        align-items: flex-start;
        gap: 24px;
      }

      .image-wrap {
        width: 100%;
        height: 220px;
      }

      :root {
        --stripe-h: 36px;
      }

      .stripe-block {
        width: 44px;
      }
    }
  </style>
</head>
<body>

  <div class="stripe top" aria-hidden="true">
    <div class="stripe-inner" id="stripe-top"></div>
  </div>

  <main class="main">
    <div class="card">

      <div class="image-wrap">
        <img src="assets/image1.png" alt="Bakım görseli">
      </div>

      <div class="text-side">
        <span class="label">Bakımda</span>
        <h1 class="heading">Senin için daha iyi hale getiriliyorr(çünkü sen mükemmeli hak ediyorsunnn)...</h1>
        <div class="divider"></div>
        <p class="sub">Bu bakım uzun sürebilir umarımm sonucu beğenirsinnn</p>
        <p class="sub">Umarım bu sefer daha iyi olur eskisinden biraz farklı olabilir</p>
        <p class="rotating-note" id="rotating-note"></p>
      </div>

    </div>
  </main>

  <div class="stripe bottom" aria-hidden="true">
    <div class="stripe-inner" id="stripe-bottom"></div>
  </div>

  <script>
    const BLOCK_COUNT = 60;

    function buildStripe(id) {
      const el = document.getElementById(id);
      const html = Array.from({ length: BLOCK_COUNT }, () => '<div class="stripe-block"></div>').join('');
      el.innerHTML = html + html;
    }

    buildStripe('stripe-top');
    buildStripe('stripe-bottom');

    const notes = [
      'Mami seni düşünürken kod yazmayı unutuyor...',
      'Mami kahvesini klavyeye döktü...',
      'Mami seni çokkkk seviyorrrrrr...',
    ];

    const noteEl = document.getElementById('rotating-note');
    let idx = 0;

    function rotateNote() {
      noteEl.classList.add('fade');
      setTimeout(() => {
        idx = (idx + 1) % notes.length;
        noteEl.textContent = notes[idx];
        noteEl.classList.remove('fade');
      }, 400);
    }

    noteEl.textContent = notes[0];
    setInterval(rotateNote, 2500);
  </script>

</body>
</html>
